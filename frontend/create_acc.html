<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | Pet Centre</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&amp;family=Plus+Jakarta+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#5f578f",
                    "secondary": "#5b5e6a",
                    "surface-dim": "#ddd9de",
                    "tertiary-container": "#c0ad5b",
                    "on-surface-variant": "#48454f",
                    "tertiary-fixed-dim": "#dac671",
                    "outline": "#797580",
                    "on-secondary": "#ffffff",
                    "on-surface": "#1c1b1f",
                    "on-error": "#ffffff",
                    "error": "#ba1a1a",
                    "surface-container-low": "#f7f2f8",
                    "on-primary": "#ffffff",
                    "error-container": "#ffdad6",
                    "surface-bright": "#fdf8fd",
                    "on-primary-fixed": "#1b1248",
                    "on-tertiary-container": "#4c4000",
                    "on-tertiary-fixed-variant": "#534600",
                    "on-secondary-fixed": "#181b26",
                    "on-tertiary-fixed": "#221b00",
                    "on-background": "#1c1b1f",
                    "surface-container-high": "#ebe7ec",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed-dim": "#c8bfff",
                    "tertiary-fixed": "#f8e28a",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed-variant": "#473f76",
                    "inverse-surface": "#313034",
                    "inverse-primary": "#c8bfff",
                    "primary-fixed": "#e5deff",
                    "on-secondary-container": "#616470",
                    "surface-container": "#f1ecf2",
                    "secondary-fixed": "#e0e1f0",
                    "secondary-fixed-dim": "#c4c6d4",
                    "outline-variant": "#c9c4d0",
                    "primary-container": "#afa6e4",
                    "on-primary-container": "#413a70",
                    "surface-variant": "#e5e1e6",
                    "on-secondary-fixed-variant": "#444652",
                    "surface": "#fdf8fd",
                    "secondary-container": "#e0e1f0",
                    "primary": "#5f578f",
                    "background": "#fdf8fd",
                    "tertiary": "#6d5e13",
                    "on-error-container": "#93000a",
                    "surface-container-highest": "#e5e1e6",
                    "inverse-on-surface": "#f4eff5"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "card-gap": "24px",
                    "section-margin": "64px",
                    "unit": "8px",
                    "container-padding-mobile": "20px",
                    "gutter": "24px",
                    "container-padding-desktop": "40px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Manrope"],
                    "display-lg": ["Manrope"],
                    "body-md": ["Plus Jakarta Sans"],
                    "headline-lg": ["Manrope"],
                    "body-lg": ["Plus Jakarta Sans"],
                    "title-lg": ["Plus Jakarta Sans"],

                    "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "600"}]

          },
        },
      }

<style>
        body {
            background-color: #FCFCFD;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .role-card.active {
            border-color: #5f578f;
            background-color: #e5deff;
        }
        .soft-shadow {
            box-shadow: 0px 8px 16px rgba(46, 46, 56, 0.04);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 md:p-12">
<!-- Account Creation Card -->
<main class="w-full max-w-[560px] bg-white rounded-[20px] soft-shadow p-8 md:p-12 border border-surface-container">
<!-- Header Section -->
<header class="text-center mb-10">
<div class="flex justify-center items-center gap-2 mb-4">
<div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pets</span>
</div>
<span class="font-headline-md text-headline-md font-extrabold tracking-tight text-primary">Pet Centre</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Create Your Account</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Join our sanctuary for professional pet care and wellness.</p>
</header>
<!-- Role Selection -->
<section class="mb-8">
<label class="block font-label-md text-label-md text-on-surface-variant mb-4">I am a...</label>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="role-selector">
<!-- Pet Owner Option -->
<button class="role-card flex flex-col items-start p-4 border-2 border-surface-variant rounded-xl text-left transition-all hover:bg-surface-container-low focus:outline-none" id="role-owner" onclick="selectRole('owner')" type="button">
<div class="w-10 h-10 rounded-lg bg-primary-container/20 flex items-center justify-center text-primary mb-3">
<span class="material-symbols-outlined">pets</span>
</div>
<span class="font-title-lg text-title-lg text-on-surface leading-tight mb-1">Pet Owner</span>
<p class="font-label-sm text-label-sm text-on-surface-variant">I want to manage my pet's health and appointments.</p>
</button>
<!-- Veterinary Option -->
<button class="role-card flex flex-col items-start p-4 border-2 border-surface-variant rounded-xl text-left transition-all hover:bg-surface-container-low focus:outline-none" id="role-vet" onclick="selectRole('vet')" type="button">
<div class="w-10 h-10 rounded-lg bg-primary-container/20 flex items-center justify-center text-primary mb-3">
<span class="material-symbols-outlined">medical_services</span>
</div>
<span class="font-title-lg text-title-lg text-on-surface leading-tight mb-1">Veterinary</span>
<p class="font-label-sm text-label-sm text-on-surface-variant">I am a professional providing medical pet care.</p>
</button>
</div>
</section>
<!-- Form Section -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Full Name -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="full_name">Full Name</label>
<input class="w-full h-14 px-5 rounded-xl border border-outline-variant bg-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body-md text-body-md outline-none" id="full_name" placeholder="Enter your full name" type="text"/>
</div>
<!-- Email Address -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="email">Email Address</label>
<input class="w-full h-14 px-5 rounded-xl border border-outline-variant bg-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body-md text-body-md outline-none" id="email" placeholder="name@example.com" type="email"/>
</div>
<!-- Password -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant px-1" for="password">Password</label>
<div class="relative">
<input class="w-full h-14 px-5 pr-12 rounded-xl border border-outline-variant bg-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body-md text-body-md outline-none" id="password" placeholder="Create a strong password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- CTA Button -->
<button class="w-full h-14 bg-primary-container text-on-primary-container hover:bg-primary hover:text-white rounded-full font-title-lg text-title-lg transition-all duration-300 shadow-sm active:scale-[0.98]" type="submit">
                Create Account
            </button>
</form>
<!-- Footer Link -->
<footer class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 transition-all" href="#">Log In</a>
</p>
</footer>
</main>
<!-- Visual Atmosphere: Subtle background shapes -->
<div class="fixed top-0 left-0 -z-10 w-full h-full overflow-hidden opacity-30 pointer-events-none">
<div class="absolute -top-24 -left-24 w-96 h-96 rounded-full bg-primary-fixed blur-3xl"></div>
<div class="absolute bottom-10 right-10 w-64 h-64 rounded-full bg-tertiary-fixed blur-3xl"></div>
</div>
<script>
        /**
         * Simple Micro-interaction for Role Selection
         */
        function selectRole(role) {
            const ownerCard = document.getElementById('role-owner');
            const vetCard = document.getElementById('role-vet');
            
            if (role === 'owner') {
                ownerCard.classList.add('active', 'border-primary', 'bg-primary-fixed');
                ownerCard.classList.remove('border-surface-variant', 'bg-transparent');
                
                vetCard.classList.remove('active', 'border-primary', 'bg-primary-fixed');
                vetCard.classList.add('border-surface-variant', 'bg-transparent');
            } else {
                vetCard.classList.add('active', 'border-primary', 'bg-primary-fixed');
                vetCard.classList.remove('border-surface-variant', 'bg-transparent');
                
                ownerCard.classList.remove('active', 'border-primary', 'bg-primary-fixed');
                ownerCard.classList.add('border-surface-variant', 'bg-transparent');
            }
        }

        // Initialize with first role
        document.addEventListener('DOMContentLoaded', () => {
            selectRole('owner');
        });
    </script>
</body></html>
