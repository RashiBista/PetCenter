name: Django CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      # Previously: group: ${{ github.workflow }}-${{ github.ref }}
      # That key didn't include the matrix values, so all 4 matrix
      # combinations (2 python-versions x 2 projects) resolved to the
      # SAME group. cancel-in-progress then killed whichever job had
      # started earlier every time another one in the matrix started —
      # this is why jobs kept getting cancelled after "1 was done."
      # Adding matrix.python-version and matrix.project here gives each
      # combination its own independent concurrency slot.
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.python-version }}-${{ matrix.project }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        python-version: ['3.10', '3.11']
        project: ['PetCentre_RegistrationSystem', 'final_chat']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: build-pip-${{ matrix.python-version }}-${{ hashFiles(format('**/{0}/requirements.txt', matrix.project)) }}
          restore-keys: |
            build-pip-${{ matrix.python-version }}-
      - name: Debug repo layout
        run: |
          echo "PWD: $(pwd)"
          ls -la || true
          test -f ${{ matrix.project }}/manage.py || { echo "manage.py not found in ${{ matrix.project }}" >&2; exit 1; }
          test -f ${{ matrix.project }}/requirements.txt || { echo "requirements.txt not found in ${{ matrix.project }}" >&2; exit 1; }
      - name: Install Dependencies
        working-directory: ./${{ matrix.project }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        working-directory: ./${{ matrix.project }}
        # DJANGO_SECRET_KEY / DJANGO_DEBUG: settings.py raises RuntimeError
        # and refuses to start if these aren't set and DEBUG=False (see
        # settings.py's fail-fast SECRET_KEY guard). manage.py test puts
        # 'test' into sys.argv, so the DB_PASSWORD/Postgres checks and
        # the real Neon connection are already bypassed by settings.py's
        # own `if 'test' in sys.argv` branches — only the secret key is
        # still required here. This value is a CI-only dummy, never used
        # outside this ephemeral container, so it's fine hardcoded rather
        # than routed through GitHub Secrets.
        env:
          DJANGO_DEBUG: "True"
          DJANGO_SECRET_KEY: "ci-test-secret-key-not-for-production-use"
        run: |
          python manage.py test
