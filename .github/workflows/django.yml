name: Django CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    # Sessions moved to a Redis-backed cache (SESSION_ENGINE =
    # django.contrib.sessions.backends.cache) to cut DB round trips on
    # every request. Redis is a separate service in the workflow, and the
    # Django settings are configured to connect to it via the REDIS_HOST 
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.python-version }}-${{ matrix.project }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        python-version: ['3.12', '3.13']
        project: ['PetCentre_RegistrationSystem']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: build-pip-${{ matrix.python-version }}-${{ hashFiles(format('**/{0}/requirements.txt', matrix.project)) }}
          restore-keys: |
            build-pip-${{ matrix.python-version }}-
      - name: Debug repo layout
        run: |
          echo "PWD: $(pwd)"
          ls -la || true
          test -f ${{ matrix.project }}/manage.py || { echo "manage.py not found in ${{ matrix.project }}" >&2; exit 1; }
          test -f ${{ matrix.project }}/requirements.txt || { echo "requirements.txt not found in ${{ matrix.project }}" >&2; exit 1; }
      - name: Install GDAL/GEOS/PROJ (required by django.contrib.gis / PostGIS)
        if: matrix.project == 'PetCentre_RegistrationSystem'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            gdal-bin \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libsqlite3-mod-spatialite
          echo "GDAL_CONFIG=/usr/bin/gdal-config" >> $GITHUB_ENV
      - name: Install Dependencies
        working-directory: ./${{ matrix.project }}
        env:
          CPLUS_INCLUDE_PATH: /usr/include/gdal
          C_INCLUDE_PATH: /usr/include/gdal
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        working-directory: ./${{ matrix.project }}
        env:
          DJANGO_DEBUG: "True"
          DJANGO_SECRET_KEY: "ci-test-secret-key-not-for-production-use"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
        run: |
          python manage.py test
