name: Django CI
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      # NOTE: this group key includes matrix.python-version and
      # matrix.project so each matrix combination gets its own
      # independent concurrency slot. Without those, all 4 combinations
      # (2 python-versions x 2 projects) collide into the same group and
      # cancel-in-progress kills whichever one started earlier every
      # time another one starts.
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.python-version }}-${{ matrix.project }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        python-version: ['3.10', '3.11']
        project: ['PetCentre_RegistrationSystem', 'final_chat']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: build-pip-${{ matrix.python-version }}-${{ hashFiles(format('**/{0}/requirements.txt', matrix.project)) }}
          restore-keys: |
            build-pip-${{ matrix.python-version }}-
      - name: Debug repo layout
        run: |
          echo "PWD: $(pwd)"
          ls -la || true
          test -f ${{ matrix.project }}/manage.py || { echo "manage.py not found in ${{ matrix.project }}" >&2; exit 1; }
          test -f ${{ matrix.project }}/requirements.txt || { echo "requirements.txt not found in ${{ matrix.project }}" >&2; exit 1; }
      - name: Install GDAL/GEOS/PROJ (required by django.contrib.gis / PostGIS)
        # Only PetCentre_RegistrationSystem uses django.contrib.gis —
        # final_chat doesn't need these packages, so this step is
        # skipped for that matrix entry to save CI time.
        if: matrix.project == 'PetCentre_RegistrationSystem'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev libgeos-dev libproj-dev
      - name: Install Dependencies
        working-directory: ./${{ matrix.project }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests
        working-directory: ./${{ matrix.project }}
        # DJANGO_SECRET_KEY / DJANGO_DEBUG: settings.py raises RuntimeError
        # and refuses to start if these aren't set and DEBUG=False (see
        # settings.py's fail-fast SECRET_KEY guard). manage.py test puts
        # 'test' into sys.argv, so the DB_PASSWORD/Postgres checks and
        # the real Neon connection are already bypassed by settings.py's
        # own `if 'test' in sys.argv` branches — only the secret key is
        # still required here. This value is a CI-only dummy, never used
        # outside this ephemeral container, so it's fine hardcoded rather
        # than routed through GitHub Secrets.
        env:
          DJANGO_DEBUG: "True"
          DJANGO_SECRET_KEY: "ci-test-secret-key-not-for-production-use"
        run: |
          python manage.py test
