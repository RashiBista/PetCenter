name: Django CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        python-version: ['3.10', '3.11']

    defaults:
      run:
        working-directory: ./final_chat

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: build-pip-${{ matrix.python-version }}-${{ hashFiles('**/final_chat/requirements.txt') }}
          restore-keys: |
            build-pip-${{ matrix.python-version }}-

      - name: Debug repo layout
        run: |
          echo "PWD: $(pwd)"
          echo "Listing final_chat:"
          ls -la final_chat || true
          if [ -f final_chat/manage.py ]; then
            echo "Found manage.py"
          else
            echo "ERROR: manage.py not found in final_chat" >&2
            exit 1
          fi
          if [ -f final_chat/requirements.txt ]; then
            echo "Found requirements.txt"
          else
            echo "ERROR: requirements.txt not found in final_chat" >&2
            exit 1
          fi

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          python manage.py test
