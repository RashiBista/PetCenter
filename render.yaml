# Env vars marked `sync: false` are secrets : Render prompts for them
# when the blueprint is first applied; copy the values from your local
# PetCentre_RegistrationSystem/.env (DB_HOST must be the real Neon host,
# not "pgbouncer").

services:
  - type: web
    name: petcenter
    runtime: docker
    rootDir: PetCentre_RegistrationSystem
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com,www.rashibista.com.np,rashibista.com.np
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com,https://www.rashibista.com.np,https://rashibista.com.np
      - key: DB_ENGINE
        value: django.contrib.gis.db.backends.postgis
      - key: DB_SSLMODE
        value: require
      - key: DB_PORT
        value: "5432"
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USE_TLS
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # Brevo HTTP-API key (Render free tier blocks outbound SMTP, so
      # EMAIL_BACKEND should be anymail.backends.brevo.EmailBackend here)
      - key: BREVO_API_KEY
        sync: false
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: petcenter-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: petcenter-redis
          property: port

  - type: keyvalue
    name: petcenter-redis
    plan: free
    # Internal-only: no external IPs may connect; the web service reaches
    # it over Render's private network (also means no auth password, which
    # matches settings.py's password-less REDIS_HOST/REDIS_PORT config).
    ipAllowList: []

  # Daily cleanup — deletes notifications older than 14 days (see
  # notifications/management/commands/cleanup_old_notifications.py).
  # dockerCommand is passed as args to entrypoint.sh, which runs it
  # directly instead of the normal migrate+Daphne boot sequence when
  # arguments are present.
  - type: cron
    name: petcenter-notification-cleanup
    runtime: docker
    rootDir: PetCentre_RegistrationSystem
    dockerfilePath: ./Dockerfile
    dockerCommand: python manage.py cleanup_old_notifications
    schedule: "0 18 * * *"
    plan: free
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DB_ENGINE
        value: django.contrib.gis.db.backends.postgis
      - key: DB_SSLMODE
        value: require
      - key: DB_PORT
        value: "5432"
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
