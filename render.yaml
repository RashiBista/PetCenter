# Render Blueprint — deploys the PetCentre_RegistrationSystem Docker app
# plus a managed Redis (Key Value) instance for Channels/cache.
#
# The database is NOT provisioned here: the app connects to the existing
# remote Neon Postgres directly (no pgbouncer sidecar on Render — the
# pooler in docker-compose.yml is a local-dev latency optimization).
#
# Env vars marked `sync: false` are secrets — Render prompts for them
# when the blueprint is first applied; copy the values from your local
# PetCentre_RegistrationSystem/.env (DB_HOST must be the real Neon host,
# not "pgbouncer").

services:
  - type: web
    name: petcenter
    runtime: docker
    rootDir: PetCentre_RegistrationSystem
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com,www.rashibista.com.np,rashibista.com.np
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com,https://www.rashibista.com.np,https://rashibista.com.np
      - key: DB_ENGINE
        value: django.contrib.gis.db.backends.postgis
      - key: DB_SSLMODE
        value: require
      - key: DB_PORT
        value: "5432"
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: EMAIL_BACKEND
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_USE_TLS
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # Brevo HTTP-API key (Render free tier blocks outbound SMTP, so
      # EMAIL_BACKEND should be anymail.backends.brevo.EmailBackend here)
      - key: BREVO_API_KEY
        sync: false
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: petcenter-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: petcenter-redis
          property: port

  - type: keyvalue
    name: petcenter-redis
    plan: free
    # Internal-only: no external IPs may connect; the web service reaches
    # it over Render's private network (also means no auth password, which
    # matches settings.py's password-less REDIS_HOST/REDIS_PORT config).
    ipAllowList: []
