{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Pet profile{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'pet_profiles/css/pet_profile.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="topbar">
        <a class="brand" href="{% url 'pet_profiles:home' %}">Pet Centre</a>
        <nav class="topbar-actions" aria-label="Profile navigation">
            <a class="icon-link" href="{% url 'core:pet_owner_notifications' %}" aria-label="Notifications">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4"/></svg>
            </a>
            <a class="icon-link" href="{% url 'chat:inbox' %}" aria-label="Messages">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h16v12H7l-3 3zM8 8h8M8 12h6"/></svg>
            </a>
            <a class="icon-link" href="{% url 'core:pet_owner_dashboard' %}" aria-label="Dashboard">
                <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3"/><path d="M5 20c1-5 13-5 14 0"/></svg>
            </a>
        </nav>
    </header>

    {% if messages %}
        <div class="message-stack" aria-live="polite">
            {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>
    <script src="{% static 'pet_profiles/js/pet_profile.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
