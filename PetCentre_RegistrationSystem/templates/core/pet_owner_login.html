<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pet Centre - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&amp;family=Manrope:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container": "#f1ecf2",
                      "on-tertiary-fixed-variant": "#534600",
                      "inverse-surface": "#313034",
                      "on-tertiary-container": "#4c4000",
                      "surface": "#fdf8fd",
                      "primary-fixed": "#e5deff",
                      "on-surface-variant": "#48454f",
                      "primary": "#5f578f",
                      "inverse-on-surface": "#f4eff5",
                      "on-primary-fixed": "#1b1248",
                      "on-primary": "#ffffff",
                      "outline": "#797580",
                      "surface-container-low": "#f7f2f8",
                      "surface-tint": "#5f578f",
                      "inverse-primary": "#c8bfff",
                      "on-surface": "#1c1b1f",
                      "on-secondary-container": "#616470",
                      "secondary-fixed": "#e0e1f0",
                      "error": "#ba1a1a",
                      "primary-container": "#afa6e4",
                      "secondary-fixed-dim": "#c4c6d4",
                      "on-primary-fixed-variant": "#473f76",
                      "error-container": "#ffdad6",
                      "on-secondary": "#ffffff",
                      "on-error-container": "#93000a",
                      "tertiary-fixed-dim": "#dac671",
                      "surface-variant": "#e5e1e6",
                      "on-primary-container": "#413a70",
                      "surface-container-lowest": "#ffffff",
                      "tertiary": "#6d5e13",
                      "on-error": "#ffffff",
                      "on-secondary-fixed-variant": "#444652",
                      "tertiary-fixed": "#f8e28a",
                      "surface-bright": "#fdf8fd",
                      "on-tertiary": "#ffffff",
                      "secondary-container": "#e0e1f0",
                      "on-secondary-fixed": "#181b26",
                      "outline-variant": "#c9c4d0",
                      "surface-container-high": "#ebe7ec",
                      "background": "#fdf8fd",
                      "on-background": "#1c1b1f",
                      "surface-container-highest": "#e5e1e6",
                      "primary-fixed-dim": "#c8bfff",
                      "secondary": "#5b5e6a",
                      "surface-dim": "#ddd9de",
                      "tertiary-container": "#c0ad5b",
                      "on-tertiary-fixed": "#221b00"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "unit": "8px",
                      "container-padding-desktop": "40px",
                      "card-gap": "24px",
                      "gutter": "24px",
                      "section-margin": "64px",
                      "container-padding-mobile": "20px"
              },
              "fontFamily": {
                      "headline-md": ["Manrope"],
                      "headline-lg-mobile": ["Manrope"],
                      "title-lg": ["Plus Jakarta Sans"],
                      "display-lg": ["Manrope"],
                      "label-md": ["Plus Jakarta Sans"],
                      "body-md": ["Plus Jakarta Sans"],
                      "headline-lg": ["Manrope"],
                      "label-sm": ["Plus Jakarta Sans"],
                      "body-lg": ["Plus Jakarta Sans"]
              },
              "fontSize": {
                      "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                      "headline-lg-mobile": ["28px", {"lineHeight": "1.3", "fontWeight": "600"}],
                      "title-lg": ["20px", {"lineHeight": "1.5", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500"}],
                      "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}],
                      "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "600"}],
                      "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]
              }
            }
          }
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0px 8px 32px rgba(46, 46, 56, 0.05);
        }
        .input-focus-ring:focus-within {
            border-color: #5f578f;
            box-shadow: 0 0 0 1px #5f578f;
        }
    </style>
</head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex items-center justify-center p-4 antialiased relative overflow-y-auto">
<!-- Abstract Background Decor -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary-container rounded-full mix-blend-multiply filter blur-[100px] opacity-30 pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] bg-surface-container-high rounded-full mix-blend-multiply filter blur-[120px] opacity-40 pointer-events-none"></div>
<main class="w-full max-w-[440px] z-10 relative">
<!-- Login Card -->
<div class="glass-panel rounded-2xl p-8 md:p-10 border border-white">
<!-- Logo / Brand Anchor -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-surface-container-low rounded-xl shadow-sm flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-[32px]">pets</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface text-center">Login to Pet Centre</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2 text-center">Welcome back! Please enter your details.</p>
<!-- Role Indicator Badge -->
<div class="mt-4 px-3 py-1 bg-surface-container-low rounded-full border border-outline-variant flex items-center gap-2">
<span class="material-symbols-outlined text-on-surface-variant text-[16px]">person</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">Pet Owner</span>
</div>
</div>
<!-- Login Form -->
{% if error %}
<div class="mb-2 px-4 py-3 rounded-lg bg-error-container text-on-error-container text-body-md">{{ error }}</div>
{% endif %}
<form class="space-y-6" method="post">
{% csrf_token %}
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface block" for="email">Email or Phone</label>
<div class="relative rounded-lg input-focus-ring border border-outline-variant bg-surface transition-colors duration-200">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-transparent border-none rounded-lg focus:ring-0 font-body-md text-body-md placeholder-outline-variant text-on-surface h-12" id="email" name="email" placeholder="Enter your email or phone" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface block" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-on-primary-fixed-variant transition-colors" href="{% url 'core:forgot_password' %}">Forgot password?</a>
</div>
<div class="relative rounded-lg input-focus-ring border border-outline-variant bg-surface transition-colors duration-200">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="w-full pl-10 pr-10 py-3 bg-transparent border-none rounded-lg focus:ring-0 font-body-md text-body-md placeholder-outline-variant text-on-surface h-12" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-12 bg-primary text-on-primary rounded-full font-label-md text-label-md flex items-center justify-center gap-2 hover:bg-on-primary-fixed-variant transition-all duration-300 shadow-[inset_0_1px_0_rgba(255,255,255,0.2),0_4px_12px_rgba(95,87,143,0.25)] hover:shadow-[inset_0_1px_0_rgba(255,255,255,0.2),0_6px_16px_rgba(95,87,143,0.35)] active:scale-[0.98]" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Registration Link -->
<div class="mt-8 text-center border-t border-outline-variant pt-6">
<p class="font-body-md text-body-md text-on-surface-variant">
                    New to Pet Centre? 
                    <a class="font-label-md text-label-md text-primary hover:text-on-primary-fixed-variant transition-colors ml-1" href="{% url 'core:pet_owner_signup' %}">Create an account</a>
</p>
</div>
</div>
</main>
</body></html>
