<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pet Centre - Admin Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary-fixed-variant": "#444652",
                        "on-error": "#ffffff",
                        "tertiary-container": "#c0ad5b",
                        "on-primary-fixed-variant": "#473f76",
                        "surface-container-low": "#f7f2f8",
                        "inverse-primary": "#c8bfff",
                        "surface-container-highest": "#e5e1e6",
                        "on-tertiary-container": "#4c4000",
                        "on-error-container": "#93000a",
                        "on-background": "#1c1b1f",
                        "error": "#ba1a1a",
                        "on-primary-fixed": "#1b1248",
                        "on-secondary": "#ffffff",
                        "on-secondary-container": "#616470",
                        "surface-container-high": "#ebe7ec",
                        "inverse-surface": "#313034",
                        "secondary-container": "#e0e1f0",
                        "on-surface": "#1c1b1f",
                        "primary-fixed": "#e5deff",
                        "on-tertiary": "#ffffff",
                        "outline": "#797580",
                        "on-surface-variant": "#48454f",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#e0e1f0",
                        "on-tertiary-fixed": "#221b00",
                        "inverse-on-surface": "#f4eff5",
                        "surface-bright": "#fdf8fd",
                        "surface-tint": "#5f578f",
                        "on-primary-container": "#413a70",
                        "primary-container": "#afa6e4",
                        "surface-variant": "#e5e1e6",
                        "on-secondary-fixed": "#181b26",
                        "secondary": "#5b5e6a",
                        "surface-dim": "#ddd9de",
                        "primary": "#5f578f",
                        "background": "#fdf8fd",
                        "secondary-fixed-dim": "#c4c6d4",
                        "surface-container": "#f1ecf2",
                        "tertiary": "#6d5e13",
                        "on-tertiary-fixed-variant": "#534600",
                        "surface": "#fdf8fd",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#dac671",
                        "tertiary-fixed": "#f8e28a",
                        "primary-fixed-dim": "#c8bfff",
                        "outline-variant": "#c9c4d0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "card-gap": "24px",
                        "unit": "8px",
                        "section-margin": "64px",
                        "container-padding-mobile": "20px",
                        "gutter": "24px",
                        "container-padding-desktop": "40px"
                    },
                    "fontFamily": {
                        "body-lg": ["Plus Jakarta Sans"],
                        "title-lg": ["Plus Jakarta Sans"],
                        "headline-lg-mobile": ["Manrope"],
                        "label-md": ["Plus Jakarta Sans"],
                        "label-sm": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "display-lg": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "headline-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "title-lg": ["20px", { "lineHeight": "1.5", "fontWeight": "600" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "label-sm": ["12px", { "lineHeight": "1.2", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center font-body-md text-on-surface antialiased p-4">
<!-- Ambient Background Elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary-container/20 blur-[120px]"></div>
<div class="absolute -bottom-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-secondary-container/30 blur-[140px]"></div>
</div>
<!-- Login Card -->
<div class="relative z-10 w-full max-w-[480px] bg-surface-container-lowest rounded-[24px] shadow-[0px_8px_32px_rgba(46,46,56,0.06)] p-8 md:p-12 border border-surface-container-high">
<!-- Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-container text-on-primary-container mb-6 shadow-sm">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">admin_panel_settings</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary mb-2 tracking-tight">Pet Centre</h1>
<p class="font-body-md text-body-md text-on-surface-variant">System Administrator Login</p>
</div>
<!-- Form -->
{% if error %}
<div class="mb-6 px-4 py-3 rounded-xl bg-error-container text-on-error-container text-body-md">{{ error }}</div>
{% endif %}
<form class="space-y-6" method="post">
{% csrf_token %}
<!-- Email / Admin ID Input -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="adminId">Admin ID or Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">badge</span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none font-body-md text-body-md" id="adminId" name="adminId" required="" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">lock</span>
<input class="w-full h-14 pl-12 pr-12 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface placeholder:text-on-surface-variant/50 focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200 outline-none font-body-md text-body-md" id="password" name="password" required="" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between pt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center justify-center">
<input class="peer sr-only" type="checkbox"/>
<div class="w-5 h-5 rounded border border-outline-variant peer-checked:bg-primary peer-checked:border-primary transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-on-primary opacity-0 peer-checked:opacity-100 transition-opacity" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim transition-colors" href="{% url 'core:forgot_password' %}">Forgot password?</a>
</div>
<!-- Login Button -->
<button class="w-full h-14 rounded-full bg-primary text-on-primary font-title-lg text-title-lg hover:bg-surface-tint shadow-md hover:shadow-lg hover:-translate-y-[1px] active:translate-y-[1px] active:shadow-sm transition-all duration-200 flex items-center justify-center gap-2 mt-8" type="submit">
                Sign In Securely
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Security Footer -->
<div class="mt-8 pt-6 border-t border-surface-container-highest text-center flex items-center justify-center gap-2 text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">encrypted</span>
<span class="font-label-sm text-label-sm">Secure connection established</span>
</div>
</div>
</body></html>
