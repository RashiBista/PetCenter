{% load static %}
<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Password - Pet Centre</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts (from design system) -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&amp;family=Plus+Jakarta+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed-variant": "#444652",
                    "on-error": "#ffffff",
                    "tertiary-container": "#c0ad5b",
                    "on-primary-fixed-variant": "#473f76",
                    "surface-container-low": "#f7f2f8",
                    "inverse-primary": "#c8bfff",
                    "surface-container-highest": "#e5e1e6",
                    "on-tertiary-container": "#4c4000",
                    "on-error-container": "#93000a",
                    "on-background": "#1c1b1f",
                    "error": "#ba1a1a",
                    "on-primary-fixed": "#1b1248",
                    "on-secondary": "#ffffff",
                    "on-secondary-container": "#616470",
                    "surface-container-high": "#ebe7ec",
                    "inverse-surface": "#313034",
                    "secondary-container": "#e0e1f0",
                    "on-surface": "#1c1b1f",
                    "primary-fixed": "#e5deff",
                    "on-tertiary": "#ffffff",
                    "outline": "#797580",
                    "on-surface-variant": "#48454f",
                    "surface-container-lowest": "#ffffff",
                    "secondary-fixed": "#e0e1f0",
                    "on-tertiary-fixed": "#221b00",
                    "inverse-on-surface": "#f4eff5",
                    "surface-bright": "#fdf8fd",
                    "surface-tint": "#5f578f",
                    "on-primary-container": "#413a70",
                    "primary-container": "#afa6e4",
                    "surface-variant": "#e5e1e6",
                    "on-secondary-fixed": "#181b26",
                    "secondary": "#5b5e6a",
                    "surface-dim": "#ddd9de",
                    "primary": "#5f578f",
                    "background": "#fdf8fd",
                    "secondary-fixed-dim": "#c4c6d4",
                    "surface-container": "#f1ecf2",
                    "tertiary": "#6d5e13",
                    "on-tertiary-fixed-variant": "#534600",
                    "surface": "#fdf8fd",
                    "error-container": "#ffdad6",
                    "on-primary": "#ffffff",
                    "tertiary-fixed-dim": "#dac671",
                    "tertiary-fixed": "#f8e28a",
                    "primary-fixed-dim": "#c8bfff",
                    "outline-variant": "#c9c4d0"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "card-gap": "24px",
                    "unit": "8px",
                    "section-margin": "64px",
                    "container-padding-mobile": "20px",
                    "gutter": "24px",
                    "container-padding-desktop": "40px"
            },
            "fontFamily": {
                    "body-lg": ["Plus Jakarta Sans"],
                    "title-lg": ["Plus Jakarta Sans"],
                    "headline-lg-mobile": ["Manrope"],
                    "label-md": ["Plus Jakarta Sans"],
                    "label-sm": ["Plus Jakarta Sans"],
                    "body-md": ["Plus Jakarta Sans"],
                    "display-lg": ["Manrope"],
                    "headline-md": ["Manrope"],
                    "headline-lg": ["Manrope"]
            },
            "fontSize": {
                    "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "title-lg": ["20px", {"lineHeight": "1.5", "fontWeight": "600"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.01em", "fontWeight": "500"}],
                    "label-sm": ["12px", {"lineHeight": "1.2", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "display-lg": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                    "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}]
            }
          }
        }
      }
    </script>
<style>
        /* Ambient Lavender Mist background effect */
        .ambient-bg {
            background: radial-gradient(circle at 15% 50%, rgba(175, 166, 228, 0.15), transparent 40%),
                        radial-gradient(circle at 85% 30%, rgba(175, 166, 228, 0.1), transparent 40%);
        }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-container-padding-mobile md:p-container-padding-desktop font-body-md text-on-surface ambient-bg relative overflow-y-auto">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
<div class="bg-surface-container-lowest w-full max-w-[440px] rounded-[24px] p-8 md:p-10 relative z-10" style="box-shadow: 0px 8px 32px rgba(46, 46, 56, 0.06), 0px 0px 1px rgba(46, 46, 56, 0.1);">
<div class="flex flex-col items-center text-center mb-8">
<div class="w-14 h-14 bg-primary-container text-primary rounded-2xl flex items-center justify-center mb-4 shadow-sm">
<span class="material-symbols-outlined text-[32px]">password</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface tracking-tight">Enter your code</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Check your email for the 6-digit code, then set a new password.</p>
</div>

{% if error %}
<div class="mb-6 px-4 py-3 rounded-xl bg-error-container text-on-error-container text-body-md">{{ error }}</div>
{% endif %}

<form class="flex flex-col gap-5" method="post">
{% csrf_token %}
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="otp">6-Digit Code</label>
<input class="w-full h-14 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md text-center tracking-[0.3em] focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors duration-200" id="otp" name="otp" required maxlength="6" type="text" inputmode="numeric" placeholder="000000"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password">New Password</label>
<input class="w-full h-14 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors duration-200" id="password" name="password" required type="password"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1" for="password2">Confirm New Password</label>
<input class="w-full h-14 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface font-body-md focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-colors duration-200" id="password2" name="password2" required type="password"/>
</div>
<button class="w-full h-14 bg-primary text-on-primary font-title-lg text-title-lg rounded-full shadow-sm hover:shadow-md hover:bg-opacity-90 active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2 mt-2" type="submit">
<span>Reset Password</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<div class="mt-6 text-center">
<a href="{% url 'core:forgot_password' %}" class="font-label-sm text-label-sm text-primary hover:underline">Didn't get a code? Send again</a>
</div>
</div>
</body></html>
