{% extends "base.html" %}
{% block title %}{{ page_title }} — PetCentre{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16 bg-white shadow-sm border rounded-2xl p-8">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">Log in to PetCentre</h1>

  {% if error %}
    <div class="bg-red-50 text-red-600 text-sm rounded-lg px-4 py-2 mb-4">
      {{ error }}
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <label class="block text-sm font-medium text-gray-600 mb-1">Username</label>
    <input type="text" name="username" required autofocus
           class="w-full mb-4 rounded-lg border border-gray-200 px-3 py-2 text-sm
                  focus:outline-none focus:ring-2 focus:ring-green-400">

    <label class="block text-sm font-medium text-gray-600 mb-1">Password</label>
    <input type="password" name="password" required
           class="w-full mb-6 rounded-lg border border-gray-200 px-3 py-2 text-sm
                  focus:outline-none focus:ring-2 focus:ring-green-400">

    <button type="submit"
            class="w-full bg-green-500 hover:bg-green-600 text-white rounded-lg
                   py-2.5 font-medium transition-colors">
      Log in
    </button>
  </form>
</div>
{% endblock %}
